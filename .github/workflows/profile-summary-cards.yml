name: GitHub-Profile-Summary-Cards

on:
  schedule: # executa a cada 24 horas
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build: # Indentado com 2 espaços
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3 # Atualizado para v3
      - uses: DoctorSolo/github-profile-summary-cards@main
        env:
          GITHUB_TOKEN: ${{ secrets.summary_card_token }}
        with:
          USERNAME: DoctorSolo
